networks:
  shared-kafka:
    external: true

volumes:
  uploads_data:

services:

  webhook-receiver:
    build: .
    networks:
      - shared-kafka
    ports:
      - "9003:8001"
    command: uvicorn app.webhook_receiver:app --host 0.0.0.0 --port 8001
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  api:
    build: .
    networks:
      - shared-kafka
    ports:
      - "9002:8000"
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TEST_WEBHOOK_URL: http://webhook-receiver:8001/webhook-files
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  worker:
    build: .
    networks:
      - shared-kafka
    command: python -m app.worker
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
